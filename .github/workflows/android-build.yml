name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip Project
        run: |
          ZIP=$(ls *.zip | head -1)
          if [ -n "$ZIP" ]; then
            echo "Found zip: $ZIP"
            unzip -o "$ZIP" -d tmp_extract
            SRC_DIR=$(find tmp_extract -name "package.json" -exec dirname {} \; | head -1)
            if [ -n "$SRC_DIR" ]; then
              rm -rf "$SRC_DIR"/.github
              cp -af "$SRC_DIR"/. .
              echo "Project files extracted to root."
            fi
            rm -rf tmp_extract "$ZIP"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install --force

      - name: Build Web Project
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -f "vite.config.ts" ]; then
            sed -i "s/base: '.*'/base: '.\/'/" vite.config.ts || sed -i "s/plugins: \[/base: '.\/', plugins: \[/" vite.config.ts
          fi
          sed -i 's/src="\/src/src=".\/src/g' index.html || true
          export VITE_GEMINI_API_KEY="$GEMINI_API_KEY"
          export GEMINI_API_KEY="$GEMINI_API_KEY"
          npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Capacitor Android Setup
        env:
          RUN_NUMBER: ${{ github.run_number }}
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          rm -rf android
          npx cap add android
          mkdir -p resources
          if [ -f "resources/icon.png" ]; then
            echo "Generating Android assets..."
            cp resources/icon.png resources/icon-only.png
            cp resources/icon.png resources/icon-foreground.png
            cp resources/icon.png resources/icon-background.png
            if [ ! -f "resources/splash.png" ]; then
              cp resources/icon.png resources/splash.png
            fi
            npx @capacitor/assets generate --android || echo "Asset generation failed, skipping..."
          fi
          V_CODE=$((10000 + RUN_NUMBER))
          V_NAME=$(node -p "require('./package.json').version")
          sed -i "s/versionCode [0-9]*/versionCode $V_CODE/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$V_NAME\"/" android/app/build.gradle
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Configuring signed build..."
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            S_PASS="${STORE_PASS:-android}"
            K_ALIAS="${KEY_ALIAS:-androiddebugkey}"
            K_PASS="${KEY_PASS:-android}"
            cat <<'EOF' > android/app/signing.gradle
android {
    signingConfigs {
        release {
            storeFile file("release.keystore")
            storePassword "STORE_PASS_PLACEHOLDER"
            keyAlias "KEY_ALIAS_PLACEHOLDER"
            keyPassword "KEY_PASS_PLACEHOLDER"
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.release
        }
        release {
            signingConfig signingConfigs.release
        }
    }
}
EOF
            sed -i "s/STORE_PASS_PLACEHOLDER/$S_PASS/" android/app/signing.gradle
            sed -i "s/KEY_ALIAS_PLACEHOLDER/$K_ALIAS/" android/app/signing.gradle
            sed -i "s/KEY_PASS_PLACEHOLDER/$K_PASS/" android/app/signing.gradle
            echo "apply from: 'signing.gradle'" >> android/app/build.gradle
          else
            echo "Generating temporary keystore..."
            keytool -genkey -v -keystore android/app/release.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Build,O=Android,C=US" -storepass android -keypass android
          fi
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
