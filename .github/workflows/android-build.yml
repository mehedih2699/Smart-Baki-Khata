name: Build Android APK (Permanent Key System)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Project
        run: npm run build

      - name: Capacitor Setup
        run: |
          npx cap add android
          npx cap sync android

      - name: Handle Keystore (Generate or Use Secret)
        run: |
          mkdir -p ~/.android
          if [ -z "${{ secrets.ANDROID_KEYSTORE }}" ]; then
            echo "--- NO KEYSTORE FOUND. GENERATING NEW PERMANENT KEY ---"
            keytool -genkey -v -keystore ~/.android/release.keystore -alias baki_khata_key -keypass android123 -storepass android123 -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Baki Khata, O=Smart, C=BD"
            echo "--- COPY THE LINE BELOW AND SAVE AS 'ANDROID_KEYSTORE' IN SECRETS ---"
            base64 -w 0 ~/.android/release.keystore
            echo ""
            echo "--- END OF KEY ---"
            cp ~/.android/release.keystore android/app/debug.keystore
          else
            echo "--- USING EXISTING KEYSTORE FROM SECRETS ---"
            echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > ~/.android/release.keystore
            cp ~/.android/release.keystore android/app/debug.keystore
          fi

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Baki-Khata-Pro-Permanent
          path: android/app/build/outputs/apk/debug/app-debug.apk
