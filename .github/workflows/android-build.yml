name: Build Android APK (Final Fix with Assets & Updates)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip Project
        run: |
          if ls *.zip 1> /dev/null 2>&1; then
            unzip -o *.zip
            if [ ! -f package.json ]; then
              mv */* . 2>/dev/null || true
            fi
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Project
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Capacitor Add Android
        run: npx cap add android || true

      - name: Generate Android Assets (Icon & Splash)
        run: |
          # আইকন এবং ফ্ল্যাশ ইমেজ জেনারেট করার জন্য সোর্স ফাইল প্রস্তুত করা
          if [ -f "resources/icon.png" ] || [ -f "resources/splash.png" ]; then
            echo "Generating assets..."
            mkdir -p assets
            # আইকনের জন্য সোর্স কপি
            [ -f "resources/icon.png" ] && cp resources/icon.png assets/icon-only.png
            [ -f "resources/icon.png" ] && cp resources/icon.png assets/icon-foreground.png
            [ -f "resources/icon.png" ] && cp resources/icon.png assets/icon-background.png
            # ফ্ল্যাশ ইমেজের জন্য সোর্স কপি
            [ -f "resources/splash.png" ] && cp resources/splash.png assets/splash.png
            
            # অ্যাসেট জেনারেশন কমান্ড রান করা
            npx @capacitor/assets generate --android
          else
            echo "No icon.png or splash.png found in resources/ folder. Skipping asset generation."
          fi

      - name: Capacitor Sync & Versioning
        run: |
          npx cap sync android
          # ভার্সন কোড এবং ভার্সন নেম আপডেট (যাতে আপডেট ইন্সটল হয়)
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"1.0.${{ github.run_number }}\"/" android/app/build.gradle

      - name: Handle Keystore (Absolute Path Fix)
        run: |
          mkdir -p ${{ github.workspace }}/keystore_dir
          
          if [ -f "android-key/release.keystore" ]; then
            echo "--- USING KEYSTORE FROM YOUR ZIP FILE ---"
            cp android-key/release.keystore ${{ github.workspace }}/keystore_dir/release.keystore
          else
            echo "--- GENERATING A BRAND NEW MASTER KEYSTORE ---"
            keytool -genkey -v -keystore ${{ github.workspace }}/keystore_dir/release.keystore -alias baki_khata_key -keypass android123 -storepass android123 -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Baki Khata, O=Smart, C=BD"
            
            mkdir -p android-key
            cp ${{ github.workspace }}/keystore_dir/release.keystore android-key/release.keystore
          fi

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore_dir/release.keystore \
            -Pandroid.injected.signing.store.password=android123 \
            -Pandroid.injected.signing.key.alias=baki_khata_key \
            -Pandroid.injected.signing.key.password=android123

      - name: Upload APK & Master Keystore
        uses: actions/upload-artifact@v4
        with:
          name: Baki-Khata-Pro-Final-Package
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android-key/release.keystore
