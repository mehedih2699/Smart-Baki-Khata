name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Unzip
        run: |
          ZIP=$(ls *.zip | head -1)
          if [ -n "$ZIP" ]; then
            unzip -o "$ZIP" -d tmp
            SRC=$(find tmp -name "package.json" -exec dirname {} \; | head -1)
            rm -rf "$SRC"/.github
            cp -af "$SRC"/. .
            rm -rf tmp "$ZIP"
          fi
      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install --force
      - name: Build
        run: |
          if [ -f "vite.config.ts" ]; then
            sed -i "s/base: '.*'/base: '.\/'/" vite.config.ts || sed -i "s/plugins: \[/base: '.\/', plugins: \[/" vite.config.ts
          fi
          sed -i 's/src="\/src/src=".\/src/g' index.html || true
          export GEMINI_API_KEY="dummy_key"
          npm run build
      - name: Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Capacitor Setup
        run: |
          # Ensure resources folder exists
          if [ ! -d "resources" ]; then
            mkdir resources
          fi
          
          # Remove existing android folder
          rm -rf android
          
          # Add android platform
          npx cap add android
          
          # Prepare icons for generation
          if [ -f "resources/icon.png" ]; then
            echo "Preparing icons..."
            cp resources/icon.png resources/icon-only.png
            cp resources/icon.png resources/icon-foreground.png
            cp resources/icon.png resources/icon-background.png
            
            # Use the standard generate command without problematic flags
            npx @capacitor/assets generate --android
          fi
          
          # Sync changes
          npx cap sync android
      - name: APK Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
