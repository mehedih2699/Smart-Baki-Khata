name: Build Android APK (Verified Signing)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip Project
        run: |
          if ls *.zip 1> /dev/null 2>&1; then
            unzip -o *.zip
            if [ ! -f package.json ]; then
              mv */* . 2>/dev/null || true
            fi
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Project (AI Advisor Safety)
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Capacitor Sync
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Prepare & Verify Keystore
        run: |
          # সিক্রেট থেকে চাবি নিয়ে আসা এবং সব অদৃশ্য স্পেস মুছে ফেলা (Cleaning)
          echo "${{ secrets.ANDROID_KEYSTORE }}" | tr -d '[:space:]' | base64 --decode > android/app/release.keystore
          
          # ভেরিফিকেশন: বিল্ডের আগে চেক করা চাবিটি কাজ করছে কি না
          echo "--- VERIFYING KEY INTEGRITY ---"
          keytool -list -v -keystore android/app/release.keystore -storepass android123 -alias baki_khata_key || { echo "ERROR: Invalid Keystore or Password!"; exit 1; }
          
          # ভার্সন কোড আপডেট
          VERSION_CODE=${{ github.run_number }}
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle

      - name: Build Android APK (Final Signing)
        run: |
          cd android
          ./gradlew assembleDebug \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password=android123 \
            -Pandroid.injected.signing.key.alias=baki_khata_key \
            -Pandroid.injected.signing.key.password=android123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Baki-Khata-Pro-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
