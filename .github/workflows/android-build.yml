name: Build Android APK (Mobile Friendly)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip Project (For Mobile Users)
        run: |
          if ls *.zip 1> /dev/null 2>&1; then
            echo "Zip file found, unzipping..."
            unzip -o *.zip
            if [ ! -f package.json ]; then
              mv */* . 2>/dev/null || true
            fi
          else
            echo "No zip file found, assuming files are already extracted."
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22  # এখানে ২০ থেকে বাড়িয়ে ২২ করা হয়েছে

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install --legacy-peer-deps
          else
            echo "Error: package.json not found! Make sure your zip contains it."
            exit 1
          fi

      - name: Build Web Project
        run: npm run build

      - name: Capacitor Setup
        run: |
          npx cap add android
          npx cap sync android

      - name: Handle Keystore (Generate or Use Secret)
        run: |
          mkdir -p ~/.android
          if [ -z "${{ secrets.ANDROID_KEYSTORE }}" ]; then
            echo "--- NO KEYSTORE FOUND. GENERATING NEW PERMANENT KEY ---"
            keytool -genkey -v -keystore ~/.android/release.keystore -alias baki_khata_key -keypass android123 -storepass android123 -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Baki Khata, O=Smart, C=BD"
            echo "--- COPY THE LINE BELOW AND SAVE AS 'ANDROID_KEYSTORE' IN SECRETS ---"
            base64 -w 0 ~/.android/release.keystore
            echo ""
            echo "--- END OF KEY ---"
            cp ~/.android/release.keystore android/app/debug.keystore
          else
            echo "--- USING EXISTING KEYSTORE FROM SECRETS ---"
            echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > ~/.android/release.keystore
            cp ~/.android/release.keystore android/app/debug.keystore
          fi

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Baki-Khata-Pro-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
