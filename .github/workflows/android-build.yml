name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract ZIP files
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          if [ -n "$ZIP_FILE" ]; then
            unzip -o "$ZIP_FILE"
            # If zipped as a folder, move contents to root
            if [ -d "project" ]; then mv project/* .; fi
            rm "$ZIP_FILE"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Build React app
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add and Sync Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          
          # Inject Permissions
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" />' $MANIFEST
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />' $MANIFEST
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' $MANIFEST
          
          # Accessibility Service
          SERVICE_XML='<service android:name=".AutomationService" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE" android:exported="true"><intent-filter><action android:name="android.accessibilityservice.AccessibilityService" /></intent-filter><meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config" /></service>'
          sed -i "s|<\/application>|${SERVICE_XML}<\/application>|" $MANIFEST

          mkdir -p android/app/src/main/res/xml
          echo '<?xml version="1.0" encoding="utf-8"?><accessibility-service xmlns:android="http://schemas.android.com/apk/res/android" android:accessibilityEventTypes="typeAllMask" android:accessibilityFeedbackType="feedbackGeneric" android:accessibilityFlags="flagDefault|flagIncludeNotImportantViews|flagRetrieveInteractiveWindows|flagReportViewIds" android:canRetrieveWindowContent="true" android:canPerformGestures="true" android:notificationTimeout="100" android:description="@string/accessibility_service_description" />' > android/app/src/main/res/xml/accessibility_service_config.xml

          sed -i '/<\/resources>/i \    <string name="accessibility_service_description">AI Automation Service</string>' android/app/src/main/res/values/strings.xml

          # Native Java Files
          PACKAGE_DIR="android/app/src/main/java/com/aiautomation/assistantpro"
          mkdir -p $PACKAGE_DIR
          echo 'package com.aiautomation.assistantpro; import android.accessibilityservice.AccessibilityService; import android.view.accessibility.AccessibilityEvent; public class AutomationService extends AccessibilityService { private static AutomationService instance; public static AutomationService getInstance() { return instance; } @Override protected void onServiceConnected() { super.onServiceConnected(); instance = this; } @Override public void onAccessibilityEvent(AccessibilityEvent event) {} @Override public void onInterrupt() {} }' > $PACKAGE_DIR/AutomationService.java
          echo 'package com.aiautomation.assistantpro; import android.content.Context; import android.provider.Settings; import com.getcapacitor.JSObject; import com.getcapacitor.Plugin; import com.getcapacitor.PluginCall; import com.getcapacitor.PluginMethod; import com.getcapacitor.annotation.CapacitorPlugin; @CapacitorPlugin(name = "AutomationBridge") public class AutomationBridge extends Plugin { @PluginMethod public void execute(PluginCall call) { JSObject ret = new JSObject(); ret.put("value", true); call.resolve(ret); } @PluginMethod public void getStatus(PluginCall call) { Context context = getContext(); boolean accessibility = isAccessibilityServiceEnabled(context, AutomationService.class); boolean overlay = Settings.canDrawOverlays(context); boolean mic = context.checkSelfPermission(android.Manifest.permission.RECORD_AUDIO) == 0; JSObject ret = new JSObject(); ret.put("accessibility", accessibility); ret.put("overlay", overlay); ret.put("mic", mic); call.resolve(ret); } private boolean isAccessibilityServiceEnabled(Context context, Class<?> service) { String prefString = Settings.Secure.getString(context.getContentResolver(), Settings.Secure.ENABLED_ACCESSIBILITY_SERVICES); if (prefString != null) { return prefString.contains(context.getPackageName() + "/" + service.getName()); } return false; } }' > $PACKAGE_DIR/AutomationBridge.java

          # --- ICON & SPLASH PROCESSING ---
          sudo apt-get update && sudo apt-get install -y imagemagick
          ICON="resources/icon.png"
          SPLASH="resources/splash.png"
          RES_DIR="android/app/src/main/res"
          
          if [ -f "$ICON" ]; then
            echo "Processing Icons..."
            mkdir -p $RES_DIR/mipmap-mdpi $RES_DIR/mipmap-hdpi $RES_DIR/mipmap-xhdpi $RES_DIR/mipmap-xxhdpi $RES_DIR/mipmap-xxxhdpi
            convert "$ICON" -resize 48x48 "$RES_DIR/mipmap-mdpi/ic_launcher.png"
            convert "$ICON" -resize 72x72 "$RES_DIR/mipmap-hdpi/ic_launcher.png"
            convert "$ICON" -resize 96x96 "$RES_DIR/mipmap-xhdpi/ic_launcher.png"
            convert "$ICON" -resize 144x144 "$RES_DIR/mipmap-xxhdpi/ic_launcher.png"
            convert "$ICON" -resize 192x192 "$RES_DIR/mipmap-xxxhdpi/ic_launcher.png"
            # Round icons
            convert "$ICON" -resize 192x192 "$RES_DIR/mipmap-xxxhdpi/ic_launcher_round.png"
          fi

          if [ -f "$SPLASH" ]; then
            echo "Processing Splash..."
            mkdir -p $RES_DIR/drawable $RES_DIR/drawable-land-mdpi $RES_DIR/drawable-land-hdpi $RES_DIR/drawable-land-xhdpi $RES_DIR/drawable-land-xxhdpi $RES_DIR/drawable-land-xxxhdpi
            mkdir -p $RES_DIR/drawable-port-mdpi $RES_DIR/drawable-port-hdpi $RES_DIR/drawable-port-xhdpi $RES_DIR/drawable-port-xxhdpi $RES_DIR/drawable-port-xxxhdpi
            convert "$SPLASH" -resize 1024x1024 "$RES_DIR/drawable/splash.png"
            # Copy to all splash locations
            cp "$RES_DIR/drawable/splash.png" "$RES_DIR/drawable-port-xxxhdpi/splash.png"
          fi

          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
