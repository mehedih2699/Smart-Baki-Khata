name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Unzip
        run: |
          ZIP=$(ls *.zip | head -1)
          if [ -n "$ZIP" ]; then
            unzip -o "$ZIP" -d tmp
            SRC=$(find tmp -name "package.json" -exec dirname {} \; | head -1)
            cp -af "$SRC"/. .
            rm -rf tmp "$ZIP"
          fi
      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install --force
      - name: Build
        run: npm run build
      - name: Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Capacitor
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            echo '{"appId": "com.smartbakikhata.app", "appName": "Smart Baki Khata", "webDir": "dist"}' > capacitor.config.json
          fi
          [ -d "android" ] || npx cap add android
          npx cap sync android
      - name: APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
