name: Build Android APK (Permanent Key System)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip Project (For Mobile Users)
        run: |
          if ls *.zip 1> /dev/null 2>&1; then
            echo "Zip file found, unzipping..."
            unzip -o *.zip
            if [ ! -f package.json ]; then
              mv */* . 2>/dev/null || true
            fi
          else
            echo "No zip file found, assuming files are already extracted."
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/assets --save-dev

      - name: Build Web Project
        run: npm run build

      - name: Capacitor Setup & Generate Assets
        run: |
          npx cap add android || true
          # আইকন এবং স্প্ল্যাশ স্ক্রিন জেনারেট করা
          if [ -d "resources" ]; then
            npx @capacitor/assets generate --android
          fi
          npx cap sync android

      - name: Handle Keystore (Use Secret)
        run: |
          mkdir -p ~/.android
          if [ -n "${{ secrets.ANDROID_KEYSTORE }}" ]; then
            echo "--- USING EXISTING KEYSTORE FROM SECRETS ---"
            echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > ~/.android/release.keystore
            cp ~/.android/release.keystore android/app/debug.keystore
          else
            echo "ERROR: ANDROID_KEYSTORE secret not found."
            exit 1
          fi

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Baki-Khata-Pro-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
