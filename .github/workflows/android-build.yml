name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Unzip
        run: |
          ZIP=$(ls *.zip | head -1)
          if [ -n "$ZIP" ]; then
            unzip -o "$ZIP" -d tmp
            SRC=$(find tmp -name "package.json" -exec dirname {} \; | head -1)
            cp -af "$SRC"/. .
            rm -rf tmp "$ZIP"
          fi
      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install --force
      - name: Build
        run: |
          # Force relative paths in vite.config.ts if it exists
          if [ -f "vite.config.ts" ]; then
            sed -i "s/plugins: \[/base: '.\/', plugins: \[/" vite.config.ts
          elif [ -f "vite.config.js" ]; then
            sed -i "s/plugins: \[/base: '.\/', plugins: \[/" vite.config.js
          fi
          npm run build
          echo "Listing dist folder contents:"
          ls -R dist
      - name: Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Capacitor Setup
        run: |
          # Ensure capacitor.config.json exists and points to the correct webDir
          echo '{"appId": "com.smartbakikhata.app", "appName": "Smart Baki Khata", "webDir": "dist", "server": {"androidScheme": "https"}}' > capacitor.config.json
          rm -rf android
          npx cap add android
          npx cap sync android
      - name: APK Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
