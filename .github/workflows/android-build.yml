name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Unzip Project
        run: |
          if ls *.zip 1> /dev/null 2>&1; then
            echo "ZIP file found, unzipping..."
            unzip *.zip -d temp_folder
            # package.json কোথায় আছে তা খুঁজে বের করা
            PKG_PATH=$(find temp_folder -name "package.json" | head -n 1)
            if [ -z "$PKG_PATH" ]; then
              echo "Error: package.json not found in ZIP"
              exit 1
            fi
            BASE_DIR=$(dirname "$PKG_PATH")
            cp -rn "$BASE_DIR"/* .
            rm -rf temp_folder *.zip
          else
            echo "No ZIP file found, using checked out files."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --force

      - name: Build Web Assets
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sync Capacitor
        run: |
          # যদি অ্যান্ড্রয়েড ফোল্ডার না থাকে তবে তৈরি করা
          if [ ! -d "android" ]; then
            echo "Android folder missing, adding it..."
            npx cap add android
          fi
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
