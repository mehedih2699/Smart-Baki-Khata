name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Unzip
        run: |
          ZIP=$(ls *.zip | head -1)
          if [ -n "$ZIP" ]; then
            unzip -o "$ZIP" -d tmp
            SRC=$(find tmp -name "package.json" -exec dirname {} \; | head -1)
            rm -rf "$SRC"/.github
            cp -af "$SRC"/. .
            rm -rf tmp "$ZIP"
          fi
      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install --force
      - name: Build
        run: |
          if [ -f "vite.config.ts" ]; then
            sed -i "s/base: '.*'/base: '.\/'/" vite.config.ts || sed -i "s/plugins: \[/base: '.\/', plugins: \[/" vite.config.ts
          fi
          sed -i 's/src="\/src/src=".\/src/g' index.html || true
          
          # এপিআই কি সেট করা হচ্ছে (আপনার দেওয়া কি-টি এখানে সরাসরি যোগ করা হয়েছে)
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            export GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
          else
            export GEMINI_API_KEY="AIzaSyAqB9JXHKgJyyzTV-dG4xAO-CQKRAhiOBY"
          fi
          
          npm run build
      - name: Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Capacitor Setup
        run: |
          if [ ! -d "resources" ]; then mkdir resources; fi
          rm -rf android
          npx cap add android
          
          # আইকন জেনারেশন
          if [ -f "resources/icon.png" ]; then
            cp resources/icon.png resources/icon-only.png
            cp resources/icon.png resources/icon-foreground.png
            cp resources/icon.png resources/icon-background.png
            npx @capacitor/assets generate --android
          fi
          
          # ভার্সন কোড বাড়ানো (যাতে আপডেট কাজ করে)
          VERSION_CODE=$((300 + ${{ github.run_number }}))
          VERSION_NAME=$(node -p "require('./package.json').version")
          
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle
          
          # স্থায়ী সিগনেচার কি (Signing Key) তৈরি
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -storepass android -keypass android
          fi
          cp ~/.android/debug.keystore android/app/debug.keystore
          
          npx cap sync android
      - name: Cache Android Keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-${{ github.repository_id }}
      - name: APK Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
