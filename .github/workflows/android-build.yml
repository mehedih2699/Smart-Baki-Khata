name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Unzip
        run: |
          ZIP=$(ls *.zip | head -1)
          if [ -n "$ZIP" ]; then
            unzip -o "$ZIP" -d tmp
            SRC=$(find tmp -name "package.json" -exec dirname {} \; | head -1)
            rm -rf "$SRC"/.github
            cp -af "$SRC"/. .
            rm -rf tmp "$ZIP"
          fi
      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install --force
      - name: Build
        run: |
          if [ -f "vite.config.ts" ]; then
            sed -i "s/base: '.*'/base: '.\/'/" vite.config.ts || sed -i "s/plugins: \[/base: '.\/', plugins: \[/" vite.config.ts
          fi
          sed -i 's/src="\/src/src=".\/src/g' index.html || true
          
          # Gemini API Key Setup (Using your new key)
          # REMOVED BLOCKED KEY FALLBACK - PLEASE SET GEMINI_API_KEY IN GITHUB SECRETS
          export VITE_GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
          export GEMINI_API_KEY="$VITE_GEMINI_API_KEY"
          
          npm run build
      - name: Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Capacitor Setup
        run: |
          # Ensure resources folder exists
          if [ ! -d "resources" ]; then
            mkdir resources
          fi
          
          # Remove existing android folder
          rm -rf android
          
          # Add android platform
          npx cap add android
          
          # Prepare icons and splash for generation
          echo "Preparing assets..."
          if [ -f "resources/icon.png" ]; then
            cp resources/icon.png resources/icon-only.png
            cp resources/icon.png resources/icon-foreground.png
            cp resources/icon.png resources/icon-background.png
            # If splash doesn't exist, use icon as fallback
            if [ ! -f "resources/splash.png" ]; then
              cp resources/icon.png resources/splash.png
            fi
          fi
          
          # Generate assets
          if [ -f "resources/icon.png" ] || [ -f "resources/splash.png" ]; then
            npx @capacitor/assets generate --android
          fi
          
          # Increment version code and name to ensure updates are recognized
          # We use a large offset + run_number to ensure it's always higher than previous manual builds
          VERSION_CODE=$((10000 + ${{ github.run_number }}))
          VERSION_NAME=$(node -p "require('./package.json').version")
          
          echo "Setting Version Code: $VERSION_CODE"
          echo "Setting Version Name: $VERSION_NAME (Build $VERSION_CODE)"
          
          # Update build.gradle with versioning
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle
          
          # --- PERMANENT SIGNING SETUP ---
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Using permanent keystore from GitHub Secrets..."
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
            
            # Inject signing configuration to build.gradle
            sed -i '/buildTypes {/i \
    signingConfigs { \
        release { \
            storeFile file("release.keystore") \
            storePassword "${{ secrets.ANDROID_KEYSTORE_PASSWORD || '\''android'\'' }}" \
            keyAlias "${{ secrets.ANDROID_KEY_ALIAS || '\''androiddebugkey'\'' }}" \
            keyPassword "${{ secrets.ANDROID_KEY_PASSWORD || '\''android'\'' }}" \
            } \
    }' android/app/build.gradle
            
            # Apply signing to debug build (since we are building assembleDebug)
            sed -i '/debug {/a \            signingConfig signingConfigs.release' android/app/build.gradle
          else
            echo "WARNING: ANDROID_KEYSTORE_BASE64 secret is missing!"
            echo "Generating a temporary keystore for this build..."
            keytool -genkey -v -keystore android/app/release.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Build,O=Android,C=US" -storepass android -keypass android
            
            # Print instructions for the user to make it permanent
            echo "------------------------------------------------------------"
            echo "!!! ACTION REQUIRED FOR PERMANENT UPDATES !!!"
            echo "Copy the Base64 string below and save it as a GitHub Secret named 'ANDROID_KEYSTORE_BASE64':"
            base64 android/app/release.keystore | tr -d '\n'
            echo -e "\n------------------------------------------------------------"
          fi
          
          # Sync changes
          npx cap sync android
      - name: APK Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
