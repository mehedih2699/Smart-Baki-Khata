name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Unzip
        run: |
          ZIP=$(ls *.zip | head -1)
          if [ -n "$ZIP" ]; then
            unzip -o "$ZIP" -d tmp
            SRC=$(find tmp -name "package.json" -exec dirname {} \; | head -1)
            rm -rf "$SRC"/.github
            cp -af "$SRC"/. .
            rm -rf tmp "$ZIP"
          fi
      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install --force
      - name: Build
        run: |
          if [ -f "vite.config.ts" ]; then
            sed -i "s/base: '.*'/base: '.\/'/" vite.config.ts || sed -i "s/plugins: \[/base: '.\/', plugins: \[/" vite.config.ts
          fi
          sed -i 's/src="\/src/src=".\/src/g' index.html || true
          
          # Gemini API Key Setup
          export VITE_GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY || 'AIzaSyDdV-Q6RqgdWdRn56v8Y6AGL9K4i3YzuRY' }}"
          export GEMINI_API_KEY="$VITE_GEMINI_API_KEY"
          
          npm run build
      - name: Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Capacitor Setup
        run: |
          if [ ! -d "resources" ]; then mkdir resources; fi
          rm -rf android
          npx cap add android
          
          if [ -f "resources/icon.png" ]; then
            cp resources/icon.png resources/icon-only.png
            cp resources/icon.png resources/icon-foreground.png
            cp resources/icon.png resources/icon-background.png
            if [ ! -f "resources/splash.png" ]; then cp resources/icon.png resources/splash.png; fi
            npx @capacitor/assets generate --android
          fi
          
          # Versioning - Using a very high number to override any previous versions
          VERSION_CODE=$((10000 + ${{ github.run_number }}))
          VERSION_NAME="1.0.${{ github.run_number }}"
          
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle
          
          # Signing Configuration
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
            # Injecting signing configs directly into build.gradle
            sed -i '/android {/a \    signingConfigs { release { storeFile file("release.keystore"); storePassword "android"; keyAlias "androiddebugkey"; keyPassword "android" } }' android/app/build.gradle
            sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/g' android/app/build.gradle
          else
            keytool -genkey -v -keystore android/app/release.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Build,O=Android,C=US" -storepass android -keypass android
            echo "--- COPY THIS CODE FOR PERMANENT SIGNING ---"
            base64 android/app/release.keystore | tr -d '\n'
            echo -e "\n--------------------------------------------"
          fi
          
          npx cap sync android
      - name: APK Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
