name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Unzip
        run: |
          ZIP=$(ls *.zip | head -1)
          if [ -n "$ZIP" ]; then
            unzip -o "$ZIP" -d tmp
            SRC=$(find tmp -name "package.json" -exec dirname {} \; | head -1)
            # জিপ ফাইলের ভেতরের ওয়ার্কফ্লো ডিলিট করা যাতে মেইন সেটিংস ঠিক থাকে
            rm -rf "$SRC"/.github
            cp -af "$SRC"/. .
            rm -rf tmp "$ZIP"
          fi
      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Install
        run: |
          npm install --legacy-peer-deps
          npm install react-is --legacy-peer-deps
      - name: Build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -f "vite.config.ts" ]; then
            sed -i "s/base: '.*'/base: '.\/'/" vite.config.ts || sed -i "s/plugins: \[/base: '.\/', plugins: \[/" vite.config.ts
          fi
          sed -i 's/src="\/src/src=".\/src/g' index.html || true
          npm run build
      - name: Capacitor Setup
        run: |
          rm -rf android
          npx cap add android
          mkdir -p resources
          if [ -f "resources/icon.png" ]; then
            cp resources/icon.png resources/icon-only.png
            cp resources/icon.png resources/icon-foreground.png
            cp resources/icon.png resources/icon-background.png
            [ -f "resources/splash.png" ] || cp resources/icon.png resources/splash.png
            npx @capacitor/assets generate --android || true
          fi
          
          # ভার্সন কোড বাড়ানো (যাতে আপডেট ইন্সটল হয়)
          VERSION_CODE=$((20000 + ${{ github.run_number }}))
          VERSION_NAME=$(node -p "require('./package.json').version")
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle
          
          # অরিজিনাল সিগনেচার ব্যবহার
          mkdir -p ~/.android
          if [ -n "${{ secrets.ANDROID_KEYSTORE }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > ~/.android/debug.keystore
          else
            keytool -genkey -v -keystore ~/.android/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -storepass android -keypass android
          fi
          cp ~/.android/debug.keystore android/app/debug.keystore
          
          npx cap sync android
      - name: APK Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: latest-build
          name: Latest Android Build
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
