name: Build Android APK (Absolute Path Fix)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip Project
        run: |
          if ls *.zip 1> /dev/null 2>&1; then
            unzip -o *.zip
            if [ ! -f package.json ]; then
              mv */* . 2>/dev/null || true
            fi
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Project (AI Advisor Safety)
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Capacitor Sync
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Prepare Keystore & Update Version
        run: |
          # সরাসরি রুট ডিরেক্টরিতে কী-স্টোর তৈরি করা
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > ${{ github.workspace }}/release.keystore
          
          # ফাইলটি তৈরি হয়েছে কি না তা চেক করা
          if [ ! -s ${{ github.workspace }}/release.keystore ]; then
            echo "Error: Keystore decoding failed!"
            exit 1
          fi

          # অটোমেটিক ভার্সন কোড বাড়ানো
          VERSION_CODE=${{ github.run_number }}
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          echo "Version Code set to: $VERSION_CODE"

      - name: Build Android APK (Forced Signing)
        run: |
          cd android
          # অ্যাবসোলিউট পাথ ব্যবহার করে বিল্ড করা
          ./gradlew assembleDebug \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.keystore \
            -Pandroid.injected.signing.store.password=android123 \
            -Pandroid.injected.signing.key.alias=baki_khata_key \
            -Pandroid.injected.signing.key.password=android123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Baki-Khata-Pro-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
