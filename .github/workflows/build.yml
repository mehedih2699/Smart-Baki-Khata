name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Unzip
        run: |
          ZIP=$(ls *.zip | head -1)
          if [ -n "$ZIP" ]; then
            unzip -o "$ZIP" -d tmp
            SRC=$(find tmp -name "package.json" -exec dirname {} \; | head -1)
            
            # CRITICAL: Remove the .github folder from the unzipped content 
            # so it doesn't overwrite our updated workflow!
            rm -rf "$SRC"/.github
            
            # Copy everything else to the root
            cp -af "$SRC"/. .
            rm -rf tmp "$ZIP"
          fi
      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: |
          npm install --legacy-peer-deps
          # Explicitly install react-is to fix recharts resolution issue in Vite/Rollup
          npm install react-is --legacy-peer-deps
      - name: Build
        run: |
          # Force relative paths in vite.config.ts
          if [ -f "vite.config.ts" ]; then
            sed -i "s/base: '.*'/base: '.\/'/" vite.config.ts || sed -i "s/plugins: \[/base: '.\/', plugins: \[/" vite.config.ts
          fi
          # Fix absolute paths in index.html before build
          sed -i 's/src="\/src/src=".\/src/g' index.html || true
          
          export GEMINI_API_KEY="dummy_key"
          npm run build
          
          # Check if dist/index.html has correct paths
          echo "Checking dist/index.html paths:"
          grep "src=" dist/index.html || true
          
          echo "Listing dist folder contents:"
          ls -R dist
      - name: Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Capacitor Setup
        run: |
          # Ensure resources folder exists
          if [ ! -d "resources" ]; then
            mkdir resources
          fi
          
          # Remove existing android folder
          rm -rf android
          
          # Add android platform
          npx cap add android
          
          # Prepare assets for generation
          if [ -f "resources/icon.png" ] || [ -f "resources/splash.png" ]; then
            echo "Preparing assets..."
            if [ -f "resources/icon.png" ]; then
              cp resources/icon.png resources/icon-only.png
              cp resources/icon.png resources/icon-foreground.png
              cp resources/icon.png resources/icon-background.png
            fi
            
            # Use the standard generate command
            npx @capacitor/assets generate --android
          fi
          
          # Increment version code and name to ensure updates are recognized
          # We use a large offset + run_number to ensure it's always higher than previous manual builds
          VERSION_CODE=$((200 + ${{ github.run_number }}))
          VERSION_NAME=$(node -p "require('./package.json').version")
          
          echo "Setting Version Code: $VERSION_CODE"
          echo "Setting Version Name: $VERSION_NAME (Build $VERSION_CODE)"
          
          # Update build.gradle with versioning
          # We target the specific lines in the defaultConfig block
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle
          
          # Ensure consistent signing by creating a fixed debug keystore if it doesn't exist
          # This will be cached by the next step
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            echo "Generating persistent debug keystore..."
            keytool -genkey -v -keystore ~/.android/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -storepass android -keypass android
          fi
          
          # Copy the persistent keystore to the android project
          cp ~/.android/debug.keystore android/app/debug.keystore
          
          # Sync changes
          npx cap sync android
      - name: Cache Android Keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-${{ github.repository_id }}
      - name: APK Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: latest-build
          name: Latest Android Build
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
